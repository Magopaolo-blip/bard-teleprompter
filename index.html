<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bard Teleprompter - Page Turn & Zoom</title>
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: rgba(18, 18, 22, 0.85);
            --border-color: #2a2a35;
            --accent-blue: #2563eb;
            --text-main: #f8fafc;
            --guideline-color: rgba(234, 179, 8, 0.35);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        .top-bar {
            width: 100%;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-sizing: border-box;
            z-index: 20;
        }

        select {
            flex: 1;
            background: #0f0f13;
            color: #f8fafc;
            border: 1px solid var(--border-color);
            padding: 10px 14px;
            font-size: 16px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
        }

        #teleprompter-container {
            flex: 1;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            overflow-y: hidden;
            text-align: center;
            font-size: 32px;
            line-height: 1.6;
            padding: 40px 24px;
            box-sizing: border-box;
            white-space: pre-wrap;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .controls {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            padding: 14px 20px;
            box-sizing: border-box;
            z-index: 20;
        }

        button, label.file-btn {
            background: #1e1e24;
            color: #f8fafc;
            border: 1px solid var(--border-color);
            padding: 10px 18px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        label.file-btn {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
        }

        .hint-badge {
            background: rgba(250, 204, 21, 0.15);
            color: #facc15;
            border: 1px solid rgba(250, 204, 21, 0.3);
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Barra Superiore con menu e importazione -->
    <div class="top-bar">
        <select id="song-select" onchange="loadSelectedSong()">
            <option value="">-- Seleziona un brano dall'archivio --</option>
        </select>
        <div class="hint-badge">👆 Centro: Pagina Avanti | Alto: Pagina Indietro</div>
        <label class="file-btn">
            📂 Importa .txt
            <input type="file" id="file-input" accept=".txt" multiple onchange="handleFiles(this.files)">
        </label>
    </div>

    <!-- Contenitore del testo a pagine -->
    <div id="teleprompter-container" onclick="handleScreenTap(event)">
Seleziona una canzone dal menu in alto.
    </div>

    <!-- Barra inferiore con Zoom e reset -->
    <div class="controls">
        <button onclick="adjustZoom(2)">Zoom +</button>
        <button onclick="adjustZoom(-2)">Zoom -</button>
        <button onclick="resetPosition()">Torna a Inizio ⬆</button>
    </div>

    <script>
        let currentFontSize = 32;
        let pages = [];
        let currentPageIndex = 0;

        const container = document.getElementById('teleprompter-container');
        const songSelect = document.getElementById('song-select');

        let songs = JSON.parse(localStorage.getItem('bard_songs')) || [];

        function initArchive() {
            songSelect.innerHTML = `<option value="">-- Seleziona un brano (${songs.length} disponibili) --</option>`;
            songs.forEach((song, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                opt.textContent = song.title;
                songSelect.appendChild(opt);
            });
        }

        function loadSelectedSong() {
            let index = songSelect.value;
            if (index === "") return;
            splitIntoPages(songs[index].text);
            currentPageIndex = 0;
            renderCurrentPage();
        }

        function handleFiles(files) {
            if (files.length === 0) return;
            Array.from(files).forEach(file => {
                let reader = new FileReader();
                reader.onload = function(e) {
                    let fileContent = e.target.result;
                    let fileTitle = file.name.replace(/\.[^/.]+$/, "");
                    let existingIndex = songs.findIndex(s => s.title === fileTitle);
                    if (existingIndex !== -1) {
                        songs[existingIndex].text = fileContent;
                    } else {
                        songs.push({ title: fileTitle, text: fileContent });
                    }
                    localStorage.setItem('bard_songs', JSON.stringify(songs));
                    initArchive();
                };
                reader.readAsText(file);
            });
        }

        function splitIntoPages(rawText) {
            pages = [];
            let lines = rawText.split("\n");
            let currentPageLines = [];
            
            lines.forEach(line => {
                currentPageLines.push(line);
                if (currentPageLines.length >= 6) {
                    pages.push(currentPageLines.join("\n"));
                    currentPageLines = [];
                }
            });
            if (currentPageLines.length > 0) {
                pages.push(currentPageLines.join("\n"));
            }
            if (pages.length === 0) {
                pages.push(rawText);
            }
        }

        function renderCurrentPage() {
            if (pages.length === 0) return;
            container.textContent = pages[currentPageIndex];
        }

        function handleScreenTap(event) {
            if (pages.length === 0) return;
            
            let screenHeight = window.innerHeight;
            let clickY = event.clientY;

            // Se tocchi nella parte alta dello schermo -> Pagina Indietro
            if (clickY < screenHeight * 0.3) {
                if (currentPageIndex > 0) {
                    currentPageIndex--;
                    renderCurrentPage();
                }
            } 
            // Se tocchi nella parte centrale/bassa -> Pagina Successiva
            else {
                if (currentPageIndex < pages.length - 1) {
                    currentPageIndex++;
                    renderCurrentPage();
                }
            }
        }

        function adjustZoom(amount) {
            currentFontSize = Math.max(20, Math.min(72, currentFontSize + amount));
            container.style.fontSize = currentFontSize + 'px';
        }

        function resetPosition() {
            currentPageIndex = 0;
            renderCurrentPage();
        }

        initArchive();
    </script>
</body>
</html>
