<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bard Teleprompter - 3 Lines Anchor</title>
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: rgba(18, 18, 22, 0.85);
            --border-color: #2a2a35;
            --accent-blue: #2563eb;
            --text-main: #f8fafc;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            box-sizing: border-box;
        }

        .top-bar {
            width: 100%;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-sizing: border-box;
            z-index: 20;
        }

        select {
            flex: 1;
            background: #0f0f13;
            color: #f8fafc;
            border: 1px solid var(--border-color);
            padding: 10px 12px;
            font-size: 15px;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            min-width: 0;
        }

        label.file-btn {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: #f8fafc;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        #teleprompter-container {
            flex: 1;
            width: 100%;
            margin: 0;
            overflow-y: scroll;
            text-align: center;
            font-size: 32px;
            line-height: 1.6;
            padding: 40px 20px 150px 20px;
            box-sizing: border-box;
            white-space: pre-wrap;
            scroll-behavior: smooth;
        }

        .controls {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            padding: 12px 16px;
            box-sizing: border-box;
            z-index: 20;
        }

        button {
            background: #1e1e24;
            color: #f8fafc;
            border: 1px solid var(--border-color);
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Barra Superiore con Importa a sinistra e Menu -->
    <div class="top-bar">
        <label class="file-btn">
            📂 Importa
            <input type="file" id="file-input" accept=".txt" multiple onchange="handleFiles(this.files)">
        </label>
        <select id="song-select" onchange="loadSelectedSong()">
            <option value="">-- Seleziona brano --</option>
        </select>
    </div>

    <!-- Contenitore del testo con ancoraggio a 3 righe -->
    <div id="teleprompter-container" onclick="handleScreenTap(event)">
Seleziona una canzone dal menu in alto.
    </div>

    <!-- Barra inferiore con Zoom e reset -->
    <div class="controls">
        <button onclick="adjustZoom(2)">Zoom +</button>
        <button onclick="adjustZoom(-2)">Zoom -</button>
        <button onclick="resetPosition()">Torna a Inizio ⬆</button>
    </div>

    <script>
        let currentFontSize = 32;
        const container = document.getElementById('teleprompter-container');
        const songSelect = document.getElementById('song-select');

        let songs = JSON.parse(localStorage.getItem('bard_songs')) || [];

        function initArchive() {
            songSelect.innerHTML = `<option value="">-- Seleziona brano (${songs.length}) --</option>`;
            songs.forEach((song, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                opt.textContent = song.title;
                songSelect.appendChild(opt);
            });
        }

        function loadSelectedSong() {
            let index = songSelect.value;
            if (index === "") return;
            container.textContent = songs[index].text;
            resetPosition();
        }

        function handleFiles(files) {
            if (files.length === 0) return;
            Array.from(files).forEach(file => {
                let reader = new FileReader();
                reader.onload = function(e) {
                    let fileContent = e.target.result;
                    let fileTitle = file.name.replace(/\.[^/.]+$/, "");
                    let existingIndex = songs.findIndex(s => s.title === fileTitle);
                    if (existingIndex !== -1) {
                        songs[existingIndex].text = fileContent;
                    } else {
                        songs.push({ title: fileTitle, text: fileContent });
                    }
                    localStorage.setItem('bard_songs', JSON.stringify(songs));
                    initArchive();
                };
                reader.readAsText(file);
            });
        }

        function handleScreenTap(event) {
            let screenHeight = window.innerHeight;
            let clickY = event.clientY;
            
            // Altezza visibile del contenitore di testo
            let visibleArea = container.clientHeight;
            
            // Calcolo esatto dello spazio occupato da 3 righe (con interlinea 1.6)
            let threeLinesHeight = currentFontSize * 1.6 * 3; 
            
            // Il salto lascia esattamente le ultime 3 righe in cima allo schermo
            let jumpAmount = visibleArea - threeLinesHeight;

            if (clickY < screenHeight * 0.3) {
                // Torna indietro
                container.scrollBy({ top: -jumpAmount, behavior: 'smooth' });
            } else {
                // Va avanti lasciando 3 righe di margine in alto
                container.scrollBy({ top: jumpAmount, behavior: 'smooth' });
            }
        }

        function adjustZoom(amount) {
            currentFontSize = Math.max(20, Math.min(72, currentFontSize + amount));
            container.style.fontSize = currentFontSize + 'px';
        }

        function resetPosition() {
            container.scrollTop = 0;
        }

        initArchive();
    </script>
</body>
</html>
